name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore W3Css.Blazor.slnx

      - name: Build
        run: dotnet build W3Css.Blazor.slnx --configuration Release --no-restore

      - name: Verify bundled stylesheet is not stale
        run: |
          # The build regenerates the committed bundle. Scoped-CSS scope ids
          # (b-XXXX) are not stable across build environments, so compare the CSS
          # content with those ids removed to catch real staleness without
          # flagging environment-specific hashes.
          strip='s/\[b-[a-z0-9]+\]//g'
          git show HEAD:src/W3Css.Blazor/wwwroot/w3css-blazor.css | sed -E "$strip" > /tmp/bundle-committed.css
          sed -E "$strip" src/W3Css.Blazor/wwwroot/w3css-blazor.css > /tmp/bundle-built.css
          diff /tmp/bundle-committed.css /tmp/bundle-built.css

      - name: Test
        run: dotnet test W3Css.Blazor.slnx --configuration Release --no-build --logger trx

      - name: Pack
        run: dotnet pack src/W3Css.Blazor/W3Css.Blazor.csproj --configuration Release --no-build --output artifacts/packages

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: nuget-package
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
