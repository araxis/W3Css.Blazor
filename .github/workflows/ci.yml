name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore W3Css.Blazor.slnx

      - name: Build
        run: dotnet build W3Css.Blazor.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test W3Css.Blazor.slnx --configuration Release --no-build --logger trx

      - name: Pack
        run: dotnet pack src/W3Css.Blazor/W3Css.Blazor.csproj --configuration Release --no-build --output artifacts/packages

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: nuget-package
          path: artifacts/packages/*.nupkg
