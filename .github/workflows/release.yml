name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version to build, package, and publish.'
        required: false
        default: '0.1.0'
      publish:
        description: 'Publish the package to NuGet'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Resolve release metadata
        id: release
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $version = '${{ github.event.inputs.version }}'
          }
          else {
            $version = '${{ github.ref_name }}'
            if ($version -like 'v*') {
              $version = $version.Substring(1)
            }
          }

          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = '0.1.0'
          }

          if (-not $version.StartsWith('v')) {
            $tag = "v$version"
          }
          else {
            $tag = $version
            $version = $version.Substring(1)
          }

          $releaseNotes = "docs/release-notes/$version.md"
          if (-not (Test-Path $releaseNotes)) {
            $releaseNotes = 'docs/release-notes/0.1.0.md'
          }

          Add-Content -Path $env:GITHUB_OUTPUT -Value "tag=$tag"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "version=$version"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "release_notes=$releaseNotes"

      - name: Restore
        run: dotnet restore W3Css.Blazor.slnx

      - name: Build
        run: dotnet build W3Css.Blazor.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test W3Css.Blazor.slnx --configuration Release --no-build --logger trx

      - name: Pack
        run: |
          dotnet pack src/W3Css.Blazor/W3Css.Blazor.csproj \
            --configuration Release \
            --no-build \
            --output artifacts/packages \
            -p:Version=${{ steps.release.outputs.version }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: Release ${{ steps.release.outputs.tag }}
          body_path: ${{ steps.release.outputs.release_notes }}
          files: artifacts/packages/*.nupkg

      - name: Publish package
        if: github.event_name == 'push' || github.event.inputs.publish == 'true'
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace("$env:NUGET_API_KEY")) {
            Write-Host 'NUGET_API_KEY secret is not set. Set this secret to publish to nuget.org.'
            exit 0
          }

          dotnet nuget push artifacts/packages/*.nupkg \
            --api-key "$env:NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
