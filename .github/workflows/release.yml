name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version to build, package, and publish.'
        required: false
        default: ''
      publish:
        description: 'Publish the package'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Resolve release metadata
        id: release
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $version = '${{ github.event.inputs.version }}'
          }
          else {
            $version = '${{ github.ref_name }}'
            if ($version -like 'v*') {
              $version = $version.Substring(1)
            }
          }

          if ([string]::IsNullOrWhiteSpace($version)) {
            [xml]$project = Get-Content 'src/W3Css.Blazor/W3Css.Blazor.csproj'
            $version = [string]($project.Project.PropertyGroup.Version | Select-Object -First 1)
          }

          if ([string]::IsNullOrWhiteSpace($version)) {
            Write-Error 'Release version could not be resolved.'
            exit 1
          }

          if (-not $version.StartsWith('v')) {
            $tag = "v$version"
          }
          else {
            $tag = $version
            $version = $version.Substring(1)
          }

          $releaseNotes = "docs/release-notes/$version.md"
          if (-not (Test-Path $releaseNotes)) {
            Write-Error "Release notes file was not found: $releaseNotes"
            exit 1
          }

          Add-Content -Path $env:GITHUB_OUTPUT -Value "tag=$tag"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "version=$version"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "release_notes=$releaseNotes"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "publish=${{ github.event_name == 'push' || github.event.inputs.publish == 'true' }}"

      - name: Restore
        run: dotnet restore W3Css.Blazor.slnx

      - name: Build
        run: dotnet build W3Css.Blazor.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test W3Css.Blazor.slnx --configuration Release --no-build --logger trx

      - name: Pack
        run: |
          dotnet pack src/W3Css.Blazor/W3Css.Blazor.csproj \
            --configuration Release \
            --no-build \
            --output artifacts/packages \
            -p:Version=${{ steps.release.outputs.version }} \
            -p:PackageVersion=${{ steps.release.outputs.version }} \
            -p:ContinuousIntegrationBuild=true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: Release ${{ steps.release.outputs.tag }}
          body_path: ${{ steps.release.outputs.release_notes }}
          files: artifacts/packages/*.nupkg

      - name: Validate publish configuration
        if: steps.release.outputs.publish == 'true'
        shell: pwsh
        env:
          PACKAGE_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace("$env:PACKAGE_API_KEY")) {
            Write-Error 'Package publishing secret is not set.'
            exit 1
          }

      - name: Publish package
        if: steps.release.outputs.publish == 'true'
        env:
          PACKAGE_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push artifacts/packages/*.nupkg \
            --api-key "$PACKAGE_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
